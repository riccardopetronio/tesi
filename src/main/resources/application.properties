spring.datasource.url=jdbc:mysql://localhost:3306/db_tesi
spring.datasource.username=root
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Spegne il grande logo ASCII iniziale
spring.main.banner-mode=off

# Imposta il livello di log a ERROR (mostra solo se qualcosa esplode davvero)
logging.level.root=ERROR

# Opzionale: se vuoi vedere i log della tua app ma non quelli di Spring
logging.level.tesi=INFO

# Questo zittisce anche i log iniziali della classe Main
logging.level.tesi.Applicazione=ERROR