# ---CONNESSIONE DATABASE ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_tesi
spring.datasource.username=root
spring.datasource.password=

# ---LOG SU FILE E ROTAZIONE (massimo 5 file e 10MB su ogniuno)---
logging.file.name=logs/tesi_app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5

# --- SQL NEL FILE DI LOG ---
# Per mandare le query nel file
logging.level.org.hibernate.SQL=DEBUG
# Per vedere anche i valori dei parametri nelle query
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ---CONFIGURAZIONE DI QUARTZ ---
spring.quartz.job-store-type=jdbc
spring.quartz.auto-startup=false

# ---AGGIORNAMENTO AUTOMATICO SCHEMA DEL DB---
spring.jpa.hibernate.ddl-auto=update

# SPEGNE LA CONSOLE
logging.pattern.console=
spring.main.banner-mode=off
