# --- DATABASE ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_tesi
spring.datasource.username=root
spring.datasource.password=

# --- LOG SU FILE & ROTAZIONE (massimo 5 file e 10MB su ogniuno)---
logging.file.name=logs/tesi_app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=5

# SPEGNE LA CONSOLE (coś l'IDE resta pulito)
logging.pattern.console=

# LIVELLO DI LOG (INFO cattura tutto l'importante)
logging.level.root=INFO

# --- SQL NEL FILE DI LOG ---
# Per mandare le query nel file
logging.level.org.hibernate.SQL=DEBUG
# Per vedere anche i valori dei parametri nelle query
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- QUARTZ ---
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update

spring.main.banner-mode=off